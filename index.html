<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="nav-left">
                <h3>Kanban Board</h3>
            </div>
            <div class="nav-right">
                <button id="add">Add new task</button>
            </div>
        </nav>

        <section class="board">

            <div class="task-column" id="todo">
                <div class="heading">
                    <div class="left">
                        <h4>To Do</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>

                <div draggable="true" class="task">
                    <h2>Task 1</h2>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                    <button>Delete</button>
                </div>
            </div>

            <div class="task-column" id="progress">
                <div class="heading">
                    <div class="left">
                        <h4>In Progress</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>
            </div>

            <div class="task-column" id="completed">
                <div class="heading">
                    <div class="left">
                        <h4>Completed</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <div class="modal add-new-task">

        <div class="bg"></div>

        <div class="modal-content">

            <div class="modal-header">
                <h3>Add New Task</h3>
                <button class="close-modal">&times;</button>
            </div>

            <div class="modal-body">
                <label for="task-title">Title</label>
                <input id="task-title" type="text" placeholder="Enter task title">
                <label for="task-desc">Description</label>
                <textarea id="task-desc" placeholder="Enter task description"></textarea>
            </div>

            <div class="modal-footer">
                <button id="add-task-btn">Add Task</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
