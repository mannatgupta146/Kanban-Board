<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="nav-left">
                <h3>Kanban Board</h3>
            </div>
            <div class="nav-right">
                <button id="add">Add new task</button>
            </div>
        </nav>

        <section class="board">

            <div class="task-column hover-over" id="todo">
                <div class="heading">
                    <div class="left">
                        <h4>To Do</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>

                <div draggable="true" class="task">
                    <h2>Task 1</h2>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                    <button>Delete</button>
                </div>
            </div>

            <div class="task-column" id="progress">
                <div class="heading">
                    <div class="left">
                        <h4>In Progress</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>
            </div>

            <div class="task-column" id="completed">
                <div class="heading">
                    <div class="left">
                        <h4>Completed</h4>
                    </div>
                    <div class="right">
                        <h4>count</h4>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
